name: Build Vitra IPA

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

env:
  MOLTENVK_VERSION: "1.2.10"
  BUILD_DIR: build/ios-release
  ARCHIVE_PATH: build/Vitra.xcarchive
  UNSIGNED_IPA: build/Vitra_unsigned.ipa

jobs:
  build:
    name: Vitra iOS IPA
    runs-on: macos-14
    timeout-minutes: 150

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Select Xcode 15.4
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Install tools
      run: |
        brew install cmake ninja
        gem install xcpretty --no-document 2>/dev/null || gem install xcpretty

    - name: Cache MoltenVK
      id: cache-mvk
      uses: actions/cache@v4
      with:
        path: MoltenVK
        key: moltenvk-${{ env.MOLTENVK_VERSION }}

    - name: Download MoltenVK
      if: steps.cache-mvk.outputs.cache-hit != 'true'
      run: |
        curl -fL \
          "https://github.com/KhronosGroup/MoltenVK/releases/download/v${MOLTENVK_VERSION}/MoltenVK-all.tar" \
          -o MoltenVK.tar
        tar -xf MoltenVK.tar

    - name: Set MoltenVK path
      run: |
        echo "MVK_LIB=$(pwd)/MoltenVK/MoltenVK.xcframework/ios-arm64/libMoltenVK.a" >> $GITHUB_ENV

    - name: Cache Boost
      uses: actions/cache@v4
      with:
        path: ${{ env.BUILD_DIR }}/external/boost
        key: boost-ios-${{ hashFiles('external/boost/Jamroot', 'external/boost/bootstrap.sh') }}

    - name: Set up sccache
      uses: mozilla-actions/sccache-action@v0.0.5

    - name: CMake Configure
      run: |
        cmake -S . -B "$BUILD_DIR" \
          -G Xcode \
          -DCMAKE_TOOLCHAIN_FILE=cmake/ios_toolchain.cmake \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_BUILD_TYPE=Release \
          -DUSE_DISCORD_RICH_PRESENCE=OFF \
          -DUSE_VITA3K_UPDATE=OFF \
          -DBUILD_APPIMAGE=OFF \
          -DMOLTENVK_STATIC_LIB="${{ env.MVK_LIB }}" \
          -DVITA3K_FORCE_CUSTOM_BOOST=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

    - name: Build & Archive
      run: |
        xcodebuild \
          -project "$BUILD_DIR/Vitra.xcodeproj" \
          -scheme Vitra \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath "$ARCHIVE_PATH" \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO \
          2>&1 | xcpretty --color

    - name: Package unsigned IPA
      run: |
        APP=$(find "$ARCHIVE_PATH" -name "Vitra.app" -type d | head -1)
        mkdir -p build/Payload
        cp -r "$APP" build/Payload/Vitra.app
        codesign --remove-signature build/Payload/Vitra.app 2>/dev/null || true
        cd build && zip -r Vitra_unsigned.ipa Payload/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Vitra-iOS
        path: ${{ env.UNSIGNED_IPA }}
        retention-days: 30

name: Build Vita3K iOS IPA

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  build-ios:
    runs-on: macos-14  # Apple Silicon runner, Xcode 15+
    timeout-minutes: 120

    steps:
    # ── 1. Checkout ───────────────────────────────────────────────────────
    - name: Checkout Vita3K
      uses: actions/checkout@v4
      with:
        submodules: recursive

    # ── 2. Xcode version ─────────────────────────────────────────────────
    - name: Select Xcode 15
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    # ── 3. Install CMake ─────────────────────────────────────────────────
    - name: Install CMake
      run: brew install cmake ninja

    # ── 4. Download MoltenVK ─────────────────────────────────────────────
    - name: Download MoltenVK
      run: |
        MOLTENVK_VERSION="1.2.10"
        curl -L "https://github.com/KhronosGroup/MoltenVK/releases/download/v${MOLTENVK_VERSION}/MoltenVK-all.tar"  \
             -o MoltenVK.tar || \
        curl -L "https://github.com/KhronosGroup/MoltenVK/releases/latest/download/MoltenVK-all.tar" \
             -o MoltenVK.tar
        tar -xf MoltenVK.tar
        echo "VITA3K_MOLTENVK=$(pwd)/MoltenVK/MoltenVK.xcframework/ios-arm64/libMoltenVK.a" >> $GITHUB_ENV
        ls MoltenVK/MoltenVK.xcframework/

    # ── 5. Cache Boost build ──────────────────────────────────────────────
    - name: Cache Boost
      uses: actions/cache@v4
      with:
        path: build/ios-device-Release/external/boost
        key: boost-ios-${{ hashFiles('external/boost/bootstrap.sh') }}

    # ── 6. CMake configure ────────────────────────────────────────────────
    - name: CMake Configure
      run: |
        cmake -S . -B build/ios-device-Release \
          -G Xcode \
          -DCMAKE_TOOLCHAIN_FILE=cmake/ios_toolchain.cmake \
          -DIOS_PLATFORM=OS64 \
          -DCMAKE_BUILD_TYPE=Release \
          -DUSE_DISCORD_RICH_PRESENCE=OFF \
          -DUSE_VITA3K_UPDATE=OFF \
          -DBUILD_APPIMAGE=OFF \
          -DMOLTENVK_STATIC_LIB="${{ env.VITA3K_MOLTENVK }}" \
          -DVITA3K_FORCE_CUSTOM_BOOST=ON \
          -DIOS_DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}"

    # ── 7. Build ──────────────────────────────────────────────────────────
    - name: Build (xcodebuild)
      run: |
        xcodebuild \
          -project build/ios-device-Release/Vita3K.xcodeproj \
          -scheme Vita3K \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -allowProvisioningUpdates \
          CODE_SIGN_IDENTITY="${{ secrets.IOS_SIGN_IDENTITY }}" \
          DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
          CODE_SIGN_STYLE=Manual \
          PROVISIONING_PROFILE_SPECIFIER="${{ secrets.IOS_PROVISIONING_PROFILE_NAME }}" \
          build \
          | xcpretty || true

    # ── 8. Import signing certificate ─────────────────────────────────────
    # (needed for IPA export — skip this block if using unsigned/sideload IPA)
    - name: Import signing certificate
      if: ${{ secrets.IOS_CERTIFICATE_P12 != '' }}
      env:
        CERTIFICATE_P12: ${{ secrets.IOS_CERTIFICATE_P12 }}
        CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
      run: |
        # Create temp keychain
        security create-keychain -p "vita3k_temp" vita3k_temp.keychain
        security set-keychain-settings -lut 21600 vita3k_temp.keychain
        security unlock-keychain -p "vita3k_temp" vita3k_temp.keychain

        # Import cert
        echo "$CERTIFICATE_P12" | base64 --decode > certificate.p12
        security import certificate.p12 \
          -k vita3k_temp.keychain \
          -P "$CERTIFICATE_PASSWORD" \
          -T /usr/bin/codesign \
          -T /usr/bin/security
        security set-key-partition-list \
          -S apple-tool:,apple:,codesign: \
          -s -k "vita3k_temp" vita3k_temp.keychain
        security list-keychains -d user -s vita3k_temp.keychain $(security list-keychains -d user | sed s/\"//g)

    # ── 9. Import provisioning profile ────────────────────────────────────
    - name: Import provisioning profile
      if: ${{ secrets.IOS_PROVISIONING_PROFILE != '' }}
      env:
        PROVISIONING_PROFILE: ${{ secrets.IOS_PROVISIONING_PROFILE }}
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo "$PROVISIONING_PROFILE" | base64 --decode \
          > ~/Library/MobileDevice/Provisioning\ Profiles/vita3k.mobileprovision

    # ── 10. Export IPA ────────────────────────────────────────────────────
    - name: Export IPA
      run: |
        # First archive
        xcodebuild \
          -project build/ios-device-Release/Vita3K.xcodeproj \
          -scheme Vita3K \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath build/Vita3K.xcarchive \
          archive \
          CODE_SIGN_IDENTITY="${{ secrets.IOS_SIGN_IDENTITY }}" \
          DEVELOPMENT_TEAM="${{ secrets.IOS_TEAM_ID }}" \
          | xcpretty || true

        # Create ExportOptions.plist
        cat > ExportOptions.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>ad-hoc</string>
            <key>teamID</key>
            <string>${{ secrets.IOS_TEAM_ID }}</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>compileBitcode</key>
            <false/>
        </dict>
        </plist>
        EOF

        # Export IPA from archive
        xcodebuild -exportArchive \
          -archivePath build/Vita3K.xcarchive \
          -exportOptionsPlist ExportOptions.plist \
          -exportPath build/ipa/ \
          | xcpretty || true

    # ── 11. Unsigned IPA fallback (for sideloading via AltStore/Sideloadly) ─
    - name: Create unsigned IPA (sideload-ready)
      run: |
        # Find the built .app
        APP_PATH=$(find build/ios-device-Release -name "Vita3K.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          echo "Vita3K.app not found, checking archive..."
          APP_PATH=$(find build/Vita3K.xcarchive -name "Vita3K.app" -type d | head -1)
        fi

        if [ -n "$APP_PATH" ]; then
          mkdir -p build/unsigned_ipa/Payload
          cp -r "$APP_PATH" build/unsigned_ipa/Payload/Vita3K.app
          cd build/unsigned_ipa
          zip -r ../Vita3K_unsigned.ipa Payload/
          cd ../..
          echo "Unsigned IPA created at build/Vita3K_unsigned.ipa"
        else
          echo "WARNING: Could not find Vita3K.app to package"
        fi

    # ── 12. Upload artifacts ──────────────────────────────────────────────
    - name: Upload signed IPA
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Vita3K-iOS-signed
        path: build/ipa/*.ipa
        if-no-files-found: ignore
        retention-days: 30

    - name: Upload unsigned IPA (for AltStore/Sideloadly)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Vita3K-iOS-unsigned
        path: build/Vita3K_unsigned.ipa
        if-no-files-found: ignore
        retention-days: 30

    - name: Upload xcarchive (for manual IPA export)
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: Vita3K-xcarchive
        path: build/Vita3K.xcarchive
        if-no-files-found: ignore
        retention-days: 7

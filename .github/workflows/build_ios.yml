name: Build Vitra IPA

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

env:
  BUILD_DIR: build/ios-release
  ARCHIVE_PATH: build/Vitra.xcarchive
  UNSIGNED_IPA: build/Vitra_unsigned.ipa

jobs:
  build:
    name: Vitra iOS IPA
    runs-on: macos-14
    timeout-minutes: 150

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Select Xcode 15.4
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Install tools
      run: |
        brew install cmake ninja molten-vk openssl@3
        OPENSSL_PREFIX=$(brew --prefix openssl@3)
        echo "OPENSSL_PREFIX=${OPENSSL_PREFIX}" >> $GITHUB_ENV
        gem install xcpretty --no-document 2>/dev/null || true

    - name: Set MoltenVK path
      run: |
        MVK_ROOT=$(brew --prefix molten-vk)
        MVK_LIB=$(find "$MVK_ROOT" -name "libMoltenVK.a" -path "*/ios*" | head -1)
        echo "MVK_LIB=${MVK_LIB}" >> $GITHUB_ENV

    - name: Patch submodules for iOS
      run: python3 patch_ios.py

    - name: Place root CMakeLists.txt
      run: cp root_CMakeLists.txt CMakeLists.txt

    - name: Cache Boost
      uses: actions/cache@v4
      with:
        path: ${{ env.BUILD_DIR }}/external/boost
        key: boost-ios-${{ hashFiles('external/boost/Jamroot', 'external/boost/bootstrap.sh') }}

    - name: Set up sccache
      uses: mozilla-actions/sccache-action@v0.0.5

    - name: CMake Configure
      run: |
        cmake -S . -B "$BUILD_DIR" \
          -G Xcode \
          -DCMAKE_TOOLCHAIN_FILE=cmake/ios_toolchain.cmake \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_BUILD_TYPE=Release \
          -DARCHITECTURE=arm64 \
          -DOPENSSL_ROOT_DIR="${{ env.OPENSSL_PREFIX }}" \
          -DOPENSSL_INCLUDE_DIR="${{ env.OPENSSL_PREFIX }}/include" \
          -DOPENSSL_CRYPTO_LIBRARY="${{ env.OPENSSL_PREFIX }}/lib/libcrypto.a" \
          -DOPENSSL_SSL_LIBRARY="${{ env.OPENSSL_PREFIX }}/lib/libssl.a" \
          -DUSE_DISCORD_RICH_PRESENCE=OFF \
          -DUSE_VITA3K_UPDATE=OFF \
          -DCURL_ENABLE_WEBSOCKETS=OFF \
          -DBUILD_APPIMAGE=OFF \
          -DMOLTENVK_STATIC_LIB="${{ env.MVK_LIB }}" \
          -DVITA3K_FORCE_CUSTOM_BOOST=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

    - name: Patch curl_config.h for iOS
      run: |
        CURL_CONFIG=$(find "$BUILD_DIR/_deps" -name "curl_config.h" 2>/dev/null | head -1)
        if [ -z "$CURL_CONFIG" ]; then
          echo "WARNING: curl_config.h not found, skipping patch"
          exit 0
        fi
        echo "Patching $CURL_CONFIG"
        python3 patch_curl_config.py "$CURL_CONFIG"
        # Touch all curl source files to invalidate Xcode's DerivedData cache
        # so patched files are actually recompiled (not served from cache).
        find "$BUILD_DIR/_deps/curl-src" -name "*.c" -o -name "*.h" | \
          xargs touch 2>/dev/null || true
        echo "Touched curl source files to invalidate Xcode cache"

    - name: Upload curl source files for debugging
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: curl-src-files
        path: |
          build/ios-release/_deps/curl-src/lib/curl_setup.h
          build/ios-release/_deps/curl-src/lib/curl_setup_once.h
          build/ios-release/_deps/curl-src/lib/ws.c
          build/ios-release/_deps/curl-build/lib/curl_config.h

    - name: Build & Archive
      run: |
        XCPROJ=$(find "$BUILD_DIR" -name "*.xcodeproj" -maxdepth 2 | head -1)
        if [ -z "$XCPROJ" ]; then
          echo "ERROR: No .xcodeproj found in $BUILD_DIR"
          exit 1
        fi
        echo "Using: $XCPROJ"
        # Find the app scheme (vita3k or Vitra), not ALL_BUILD which doesn't
        # propagate xcodebuild command-line overrides to dependent library targets.
        SCHEME=$(xcodebuild -project "$XCPROJ" -list 2>/dev/null \
          | awk '/Schemes:/{found=1; next} found && NF{gsub(/^[[:space:]]+/,""); if ($0 != "ALL_BUILD" && $0 != "ZERO_CHECK" && $0 != "install" && $0 != "RUN_TESTS" && $0 != "PACKAGE") {print $0; exit}}')
        if [ -z "$SCHEME" ]; then
          SCHEME=$(xcodebuild -project "$XCPROJ" -list 2>/dev/null \
            | awk '/Schemes:/{found=1; next} found && NF{print $1; exit}')
        fi
        echo "Scheme: $SCHEME"
        xcodebuild \
          -project "$XCPROJ" \
          -scheme "$SCHEME" \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath "$ARCHIVE_PATH" \
          -derivedDataPath "$BUILD_DIR/derived-data" \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO \
          IPHONEOS_DEPLOYMENT_TARGET=15.0 \
          CLANG_CXX_LANGUAGE_STANDARD=c++20 \
          CLANG_CXX_LIBRARY=libc++ \
          OTHER_CPLUSPLUSFLAGS="-D_LIBCPP_DISABLE_AVAILABILITY -D_LIBCPP_REMOVE_TRANSITIVE_INCLUDES" \
          OTHER_CFLAGS="-DCURL_SIZEOF_CURL_OFF_T=8 -DCURL_TYPEOF_CURL_OFF_T='long long' -DHAVE_STRUCT_TIMEVAL=1 -DHAVE_RECV=1 -DHAVE_SEND=1" \
          GCC_PREPROCESSOR_DEFINITIONS="$(GCC_PREPROCESSOR_DEFINITIONS) _LIBCPP_DISABLE_AVAILABILITY=1 CURL_SIZEOF_CURL_OFF_T=8 HAVE_STRUCT_TIMEVAL=1 HAVE_RECV=1 HAVE_SEND=1" \
          2>&1
        test -d "$ARCHIVE_PATH" || { echo "ERROR: archive not created"; exit 1; }

    - name: Package unsigned IPA
      run: |
        APP=$(find "$ARCHIVE_PATH" -name "Vitra.app" -type d | head -1)
        mkdir -p build/Payload
        cp -r "$APP" build/Payload/Vitra.app
        codesign --remove-signature build/Payload/Vitra.app 2>/dev/null || true
        cd build && zip -r Vitra_unsigned.ipa Payload/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Vitra-iOS
        path: ${{ env.UNSIGNED_IPA }}
        retention-days: 30

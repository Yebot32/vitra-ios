name: Build Vitra IPA

on:
  push:
    branches: [ master, main ]
    paths-ignore:
      - '**/*.md'
      - '.github/ISSUE_TEMPLATE/**'
  workflow_dispatch:

env:
  BUILD_DIR: build/ios-release
  ARCHIVE_PATH: build/Vitra.xcarchive
  UNSIGNED_IPA: build/Vitra_unsigned.ipa

jobs:
  build:
    name: Vitra iOS IPA
    runs-on: macos-14
    timeout-minutes: 150

    steps:

    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Select Xcode 15.4
      run: sudo xcode-select -s /Applications/Xcode_15.4.app

    - name: Install tools
      run: |
        brew install cmake ninja molten-vk openssl@3
        OPENSSL_PREFIX=$(brew --prefix openssl@3)
        echo "OPENSSL_PREFIX=${OPENSSL_PREFIX}" >> $GITHUB_ENV
        gem install xcpretty --no-document 2>/dev/null || true

    - name: Set MoltenVK path
      run: |
        MVK_ROOT=$(brew --prefix molten-vk)
        MVK_LIB=$(find "$MVK_ROOT" -name "libMoltenVK.a" -path "*/ios*" | head -1)
        echo "MVK_LIB=${MVK_LIB}" >> $GITHUB_ENV
        echo "Found: $MVK_LIB"

    # The repo's root CMakeLists.txt is the iOS-specific one (no project()).
    # We place a proper root cmake that has cmake_minimum_required + project()
    # and delegates to vita3k/CMakeLists.txt via add_subdirectory.
    - name: Patch submodules for iOS
      run: |
        CUBEB_CMAKE="external/cubeb/CMakeLists.txt"

        # cubeb_audiounit.cpp and cubeb_osx_run_loop.cpp both use
        # CoreAudio types (AudioObjectPropertyAddress, kAudioHardware*)
        # that are macOS-only and don't exist on iOS.
        # Wrap the entire USE_AUDIOUNIT block so it is skipped on iOS.
        # We use Python for reliable multi-line sed on macOS.
        python3 - "$CUBEB_CMAKE" << 'PYEOF'
import sys, re
path = sys.argv[1]
with open(path, 'r') as f:
    content = f.read()

old = '''check_include_files(AudioUnit/AudioUnit.h USE_AUDIOUNIT)
if(USE_AUDIOUNIT)'''
new = '''check_include_files(AudioUnit/AudioUnit.h USE_AUDIOUNIT)
# cubeb_audiounit uses CoreAudio HAL APIs that are macOS-only (not iOS)
if(USE_AUDIOUNIT AND NOT CMAKE_SYSTEM_NAME STREQUAL "iOS")'''

content = content.replace(old, new)
with open(path, 'w') as f:
    f.write(content)
print("Patched", path)
PYEOF

    - name: Place root CMakeLists.txt
      run: cp root_CMakeLists.txt CMakeLists.txt

    - name: Cache Boost
      uses: actions/cache@v4
      with:
        path: ${{ env.BUILD_DIR }}/external/boost
        key: boost-ios-${{ hashFiles('external/boost/Jamroot', 'external/boost/bootstrap.sh') }}

    - name: Set up sccache
      uses: mozilla-actions/sccache-action@v0.0.5

    - name: CMake Configure
      run: |
        cmake -S . -B "$BUILD_DIR" \
          -G Xcode \
          -DCMAKE_TOOLCHAIN_FILE=cmake/ios_toolchain.cmake \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_BUILD_TYPE=Release \
          -DARCHITECTURE=arm64 \
          -DOPENSSL_ROOT_DIR="${{ env.OPENSSL_PREFIX }}" \
          -DOPENSSL_INCLUDE_DIR="${{ env.OPENSSL_PREFIX }}/include" \
          -DOPENSSL_CRYPTO_LIBRARY="${{ env.OPENSSL_PREFIX }}/lib/libcrypto.a" \
          -DOPENSSL_SSL_LIBRARY="${{ env.OPENSSL_PREFIX }}/lib/libssl.a" \
          -DUSE_DISCORD_RICH_PRESENCE=OFF \
          -DUSE_VITA3K_UPDATE=OFF \
          -DBUILD_APPIMAGE=OFF \
          -DMOLTENVK_STATIC_LIB="${{ env.MVK_LIB }}" \
          -DVITA3K_FORCE_CUSTOM_BOOST=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

    - name: Build & Archive
      run: |
        # Discover the generated Xcode project (CMake may name it after the project())
        XCPROJ=$(find "$BUILD_DIR" -name "*.xcodeproj" -maxdepth 2 | head -1)
        if [ -z "$XCPROJ" ]; then
          echo "ERROR: No .xcodeproj found in $BUILD_DIR"
          ls -la "$BUILD_DIR" || true
          exit 1
        fi
        echo "Using Xcode project: $XCPROJ"

        # List available schemes so we can pick the right one
        SCHEME=$(xcodebuild -project "$XCPROJ" -list 2>/dev/null \
          | awk '/Schemes:/{found=1; next} found && NF{print $1; exit}')
        echo "Using scheme: $SCHEME"

        xcodebuild \
          -project "$XCPROJ" \
          -scheme "$SCHEME" \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath "$ARCHIVE_PATH" \
          archive \
          CODE_SIGN_IDENTITY="" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO \
          2>&1 | xcpretty --color

        # xcpretty can mask failures — check explicitly
        if [ ! -d "$ARCHIVE_PATH" ]; then
          echo "ERROR: Archive not created at $ARCHIVE_PATH"
          exit 1
        fi
        echo "Archive created successfully: $ARCHIVE_PATH"

    - name: Package unsigned IPA
      run: |
        APP=$(find "$ARCHIVE_PATH" -name "Vitra.app" -type d | head -1)
        mkdir -p build/Payload
        cp -r "$APP" build/Payload/Vitra.app
        codesign --remove-signature build/Payload/Vitra.app 2>/dev/null || true
        cd build && zip -r Vitra_unsigned.ipa Payload/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Vitra-iOS
        path: ${{ env.UNSIGNED_IPA }}
        retention-days: 30

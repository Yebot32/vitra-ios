name: Build Vitra iOS IPA (Unsigned)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  MOLTENVK_VERSION: "1.2.10"
  BUILD_DIR: build/ios-release
  SCHEME: Vitra
  ARCHIVE_PATH: build/Vitra.xcarchive
  UNSIGNED_IPA: Vitra_unsigned.ipa

jobs:
  build-ipa:
    name: Build Vitra IPA
    runs-on: macos-14
    timeout-minutes: 150

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Select Xcode 15.4
      run: |
        sudo xcode-select -s /Applications/Xcode_15.4.app
        xcodebuild -version

    - name: Install CMake + Ninja
      run: brew install cmake ninja

    - name: Download MoltenVK
      run: |
        set -e
        echo "Downloading MoltenVK v${MOLTENVK_VERSION}..."
        curl -f -L -o MoltenVK.tar.gz "https://github.com/KhronosGroup/MoltenVK/releases/download/v${MOLTENVK_VERSION}/MoltenVK-ios.tar.gz" || { echo "Failed to download MoltenVK"; exit 1; }
        echo "Verifying file type..."
        file MoltenVK.tar.gz
        echo "Extracting MoltenVK..."
        mkdir -p MoltenVK
        tar -xzf MoltenVK.tar.gz -C MoltenVK --strip-components=1 || { echo "Failed to extract tar.gz"; exit 1; }
        echo "Verifying MoltenVK files..."
        find MoltenVK -name "libMoltenVK.a" || { echo "Warning: libMoltenVK.a not found"; }

    - name: Set Environment Variables
      run: |
        MVK_DIR="$(pwd)/MoltenVK"
        echo "MOLTENVK_DIR=$MVK_DIR" >> $GITHUB_ENV
        echo "VITA3K_MOLTENVK_DIR=$MVK_DIR" >> $GITHUB_ENV

    - name: CMake Configure
      run: |
        cmake -S . -B "$BUILD_DIR" \
          -G Xcode \
          -DCMAKE_TOOLCHAIN_FILE=cmake/ios_toolchain.cmake \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_BUILD_TYPE=Release \
          -DUSE_DISCORD_RICH_PRESENCE=OFF \
          -DUSE_VITA3K_UPDATE=OFF \
          -DBUILD_APPIMAGE=OFF \
          -DMoltenVK_DIR="${{ env.MOLTENVK_DIR }}" \
          -DMOLTENVK_STATIC_LIB="${{ env.MOLTENVK_DIR }}/MoltenVK.xcframework/ios-arm64/libMoltenVK.a" \
          -DVITA3K_FORCE_CUSTOM_BOOST=ON

    - name: Archive (Unsigned Build)
      run: |
        xcodebuild \
          -project "$BUILD_DIR/Vitra.xcodeproj" \
          -scheme "$SCHEME" \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath "$ARCHIVE_PATH" \
          archive \
          CODE_SIGNING_ALLOWED=NO \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGN_IDENTITY="-" \
          COMPILER_INDEX_STORE_ENABLE=NO

    - name: Package Unsigned IPA
      run: |
        APP_PATH=$(find "$ARCHIVE_PATH" -name "Vitra.app" -type d | head -1)
        if [ -z "$APP_PATH" ]; then
          APP_PATH=$(find "$BUILD_DIR" -name "Vitra.app" -type d | head -1)
        fi
        if [ -z "$APP_PATH" ]; then exit 1; fi
        mkdir -p Payload
        cp -r "$APP_PATH" Payload/
        codesign --remove-signature Payload/Vitra.app || true
        zip -r "Vitra_unsigned.ipa" Payload/

    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: Vitra-iOS-unsigned
        path: Vitra_unsigned.ipa
        retention-days: 7
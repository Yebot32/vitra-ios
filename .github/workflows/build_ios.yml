name: Build Vitra iOS IPA (Unsigned)

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

env:
  MOLTENVK_VERSION: "1.2.10"
  BUILD_DIR: build/ios-release
  SCHEME: Vitra
  ARCHIVE_PATH: build/Vitra.xcarchive
  UNSIGNED_IPA: build/Vitra_unsigned.ipa

jobs:
  build-ipa:
    name: Build Vitra IPA
    runs-on: macos-14
    timeout-minutes: 150

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive
        fetch-depth: 0

    - name: Select Xcode 15.4
      run: |
        sudo xcode-select -s /Applications/Xcode_15.4.app
        xcodebuild -version

    - name: Install CMake + Ninja
      run: brew install cmake ninja

    - name: Cache MoltenVK
      id: cache-mvk
      uses: actions/cache@v4
      with:
        path: MoltenVK
        key: moltenvk-${{ env.MOLTENVK_VERSION }}

    - name: Download MoltenVK
      if: steps.cache-mvk.outputs.cache-hit != 'true'
      run: |
        # Fixed the URL to include .tar.gz to resolve the 404 error
        curl -fL "https://github.com/KhronosGroup/MoltenVK/releases/download/v${MOLTENVK_VERSION}/MoltenVK-all.tar.gz" -o MoltenVK.tar.gz
        tar -xf MoltenVK.tar.gz
        mv MoltenVK-all MoltenVK

    - name: Set MoltenVK path
      run: |
        MVK_LIB="$(pwd)/MoltenVK/MoltenVK.xcframework/ios-arm64/libMoltenVK.a"
        echo "VITA3K_MOLTENVK=${MVK_LIB}" >> $GITHUB_ENV

    - name: Cache Boost
      uses: actions/cache@v4
      with:
        path: ${{ env.BUILD_DIR }}/external/boost
        key: boost-ios-arm64-${{ hashFiles('external/boost/Jamroot', 'external/boost/bootstrap.sh') }}

    - name: Set up sccache
      uses: mozilla-actions/sccache-action@v0.0.5

    - name: CMake Configure
      run: |
        cmake -S . -B "$BUILD_DIR" \
          -G Xcode \
          -DCMAKE_TOOLCHAIN_FILE=cmake/ios_toolchain.cmake \
          -DCMAKE_SYSTEM_NAME=iOS \
          -DCMAKE_BUILD_TYPE=Release \
          -DUSE_DISCORD_RICH_PRESENCE=OFF \
          -DUSE_VITA3K_UPDATE=OFF \
          -DBUILD_APPIMAGE=OFF \
          -DMOLTENVK_STATIC_LIB="${{ env.VITA3K_MOLTENVK }}" \
          -DVITA3K_FORCE_CUSTOM_BOOST=ON \
          -DCMAKE_C_COMPILER_LAUNCHER=sccache \
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

    - name: Archive (Force Unsigned)
      run: |
        # Removed '|| true' so we can catch real C++ errors
        xcodebuild \
          -project "$BUILD_DIR/Vitra.xcodeproj" \
          -scheme "$SCHEME" \
          -configuration Release \
          -destination "generic/platform=iOS" \
          -archivePath "$ARCHIVE_PATH" \
          archive \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO \
          COMPILER_INDEX_STORE_ENABLE=NO

    - name: Package unsigned IPA
      run: |
        APP_PATH=$(find "$ARCHIVE_PATH" -name "Vitra.app" -type d 2>/dev/null | head -1)
        if [ -z "$APP_PATH" ]; then 
          echo "ERROR: Vitra.app not found in archive. Checking build dir..."
          APP_PATH=$(find "$BUILD_DIR" -name "Vitra.app" -type d 2>/dev/null | head -1)
        fi
        
        if [ -z "$APP_PATH" ]; then 
          echo "FATAL ERROR: Could not find Vitra.app anywhere."
          exit 1
        fi
        
        echo "Found App at: $APP_PATH"
        mkdir -p build/unsigned_payload/Payload
        cp -r "$APP_PATH" build/unsigned_payload/Payload/Vitra.app
        
        # Remove any existing signature to ensure it's truly unsigned
        codesign --remove-signature build/unsigned_payload/Payload/Vitra.app 2>/dev/null || true
        
        cd build/unsigned_payload
        zip -r "../../Vitra_unsigned.ipa" Payload/

    - name: Upload unsigned IPA
      uses: actions/upload-artifact@v4
      with:
        name: Vitra-iOS-unsigned
        path: Vitra_unsigned.ipa
        if-no-files-found: error
        retention-days: 30
